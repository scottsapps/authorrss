name: Update RSS Feed

on:
  schedule:
    - cron: "0 12 * * *"  # runs daily at noon UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Chotiner scraper
        run: python scrape_chotiner.py

      - name: Run Magary scraper
        run: python scrape_magary.py

      - name: Commit and push feeds
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add chotiner-feed.xml magary-feed.xml
          git diff --cached --quiet || git commit -m "Update RSS feeds"
          git push --rebase && git push
