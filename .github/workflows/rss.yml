name: Push articles to Wallabag

on:
  schedule:
    - cron: "0 12 * * *"  # 8am Eastern
    - cron: "0 20 * * *"  # 4pm Eastern
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 trafilatura python-dotenv

      - name: Run scrapers
        env:
          WALLABAG_CLIENT_ID: ${{ secrets.WALLABAG_CLIENT_ID }}
          WALLABAG_CLIENT_SECRET: ${{ secrets.WALLABAG_CLIENT_SECRET }}
          WALLABAG_USERNAME: ${{ secrets.WALLABAG_USERNAME }}
          WALLABAG_PASSWORD: ${{ secrets.WALLABAG_PASSWORD }}
        run: |
          python scrape_chotiner.py
          python scrape_magary.py
